<!DOCTYPE html>
<html>
<head>
<title>{{ site.title }}</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  max-width: 760px;
  margin: 60px auto;
  padding: 0 20px;
  line-height: 1.7;
}

nav a {
  margin-right: 18px;
  text-decoration: none;
  color: #444;
}

nav {
  margin-bottom: 40px;
}
  img {
  width: 220px;
  height: auto;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  border-radius: 4px;
  margin: 20px 0;
}
  input, textarea, select {
  border: 1px solid #ccc;
  background-color: #fafafa;
  border-radius: 4px;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #888;
  background-color: #fff;
}
  h1 { font-size: 32px; }
h2 { margin-top: 30px; font-size: 22px; }
h3 { margin-top: 25px; font-size: 18px; }
  h2 {
  font-weight: 500;
  font-size: 20px;
  color: #555;
}

h3 {
  margin-top: 35px;
  margin-bottom: 10px;
}

p {
  margin-bottom: 14px;
}

a {
  color: #5a3ec8;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>

</head>

  <body>

<h2></h2>{{ site.title }}</h2>
<p>Theology Writer</p>
<p>MA Theological Studies @LibertyU</p>

<nav>
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/essays">Essays</a>
<a href="/books">Books</a>
<a href="/contact">Contact</a>
</nav>

{% if page.layout == "post" %}
 <h1 style="margin-bottom: 5px;">{{ page.title }}</h1>

  <p style="color:#666; margin-top:-10px;">
    {{ page.date | date: "%B %-d, %Y" }}
  </p>
{% endif %}
    
{{ content }}
